<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>serie-detalhe</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" color="light">
<ion-card *ngIf="serie">
    <ion-card-header>
      <img *ngIf="serie.cartaz" src="{{serie.cartaz}}" alt="img"/>
      <ion-icon *ngIf="!serie.cartaz" name="videocam-off"></ion-icon>
    </ion-card-header>
    <ion-card-content>
      <h1>{{serie.nome}}</h1>
      <p>Data de Lançamento: {{serie.lancamento}}</p>
      <label>Classificação Indicativa: </label>
        <ion-chip [color]="serie.classificacao < 5 ? 'danger' : ((serie.classificacao < 7 ? 'warning' : 'success'))" outline>
          <ion-label>{{serie.classificacao}}</ion-label>
        </ion-chip>

    </ion-card-content>
  </ion-card>
</ion-content>
