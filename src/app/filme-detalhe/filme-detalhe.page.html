<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>filmeDetalhe</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" color="light">
  <ion-card *ngIf="filme">
    <ion-card-header>
      <img *ngIf="filme.cartaz" src="{{filme.cartaz}}" alt="img"/>
      <ion-icon *ngIf="!filme.cartaz" name="videocam-off"></ion-icon>
    </ion-card-header>
    <ion-card-content>
      <h1>{{filme.nome}}</h1>
      <p>Data de Lançamento: {{filme.lancamento}}</p>
      <label>Classificação Indicativa: </label>
        <ion-chip [color]="filme.classificacao < 5 ? 'danger' : ((filme.classificacao < 7 ? 'warning' : 'success'))" outline>
          <ion-label>{{filme.classificacao}}</ion-label>
        </ion-chip>

    </ion-card-content>
  </ion-card>
</ion-content>
