<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Tab 3
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-list *ngIf="listaatores">
    <ion-item-sliding *ngFor="let ator of listaatores">
      <ion-item lines="full" (click)="exibirator(ator)">
        <ion-thumbnail slot="start">
        <img *ngIf="ator.foto" src="{{ator.foto}}" alt=""/>
        <ion-icon *ngIf="!ator.foto" name="videocam-off"></ion-icon>
        </ion-thumbnail>

        <ion-label class="ion-text-wrap">
          <div>
            <h1>{{ator.nome}}</h1>
            <p> Idade: {{ator.idade}}</p>
            <label>Generos de atuação: </label><br>
            <ion-badge color="medium" *ngFor="let genero of ator.generos">{{genero}}
            </ion-badge>
            <ion-icon name="star" [color]="ator.favorito===true ? 'warning' : ('light')"></ion-icon>
          </div>
        </ion-label>
        <ion-chip [color]="ator.nota < 5 ? 'danger' : ((ator.nota < 7 ? 'warning' : 'success'))" outline>
          <ion-label>{{ator.nota}}</ion-label>
        </ion-chip>
      </ion-item>

      <ion-item-options side="start">
        <ion-item-option color="primary" (click)="exibirAlertaFavorito(ator)">
          <ion-icon slot="icon-only" name="star"></ion-icon>
        </ion-item-option>

      </ion-item-options>
    </ion-item-sliding>

  </ion-list>

  <app-explore-container name="Tab 3 page"></app-explore-container>
</ion-content>
